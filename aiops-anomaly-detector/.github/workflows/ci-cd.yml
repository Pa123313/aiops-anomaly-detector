name: CI/CD — AIOps Anomaly Detector

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aiops-anomaly-detector

jobs:

  # ── 1. Lint & Test ────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: flake8 app/detector.py --max-line-length=120

  # ── 2. Security Scan ──────────────────────────────────────────────────────
  security:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t aiops-detector:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aiops-detector:scan
          format:    table
          severity:  CRITICAL,HIGH
          exit-code: 1   # fail pipeline on CRITICAL/HIGH CVEs

  # ── 3. Build & Push ───────────────────────────────────────────────────────
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context:   .
          push:      true
          platforms: linux/amd64,linux/arm64
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 4. Deploy to Kubernetes via Helm ─────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig

      - name: Deploy with Helm
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG:  sha-${{ github.sha }}
        run: |
          helm upgrade --install aiops-detector ./helm/aiops-detector \
            --namespace aiops \
            --create-namespace \
            --set image.tag=$IMAGE_TAG \
            --wait --timeout=5m

      - name: Verify deployment
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl rollout status deployment/aiops-detector -n aiops
          kubectl get pods -n aiops
